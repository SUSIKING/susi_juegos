<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#050716" />
  <title>LaberinOjo</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
<div id="wrap">
  <header>
    <div class="hudL">Nivel<b id="levelTxt">1</b></div>
    <div class="hudC">Tiempo<b id="timeTxt">0.00</b></div>
    <div class="hudR">Vidas<div id="lives" class="lives"></div></div>
  </header>

  <main id="stage">
    <canvas id="game"></canvas>
    <button id="teleportBtn" aria-label="Teletransporte de emergencia">✦</button>
    <div id="overlay">
      <div class="card">
        <h1>LaberinOjo</h1>
        <p>Llega a la meta en el menor tiempo posible. El joystick es invisible: toca y arrastra en cualquier parte.</p>
        <p>Chocar paredes debilita el ojo. Tienes 5 vidas por intento.</p>
        <div id="versionTag" class="versionTag">v0.0.0.1</div>
        <div class="btn">Tocar para comenzar</div>
      </div>
    </div>
  </main>

  <footer><div class="pill">Arrastra corto = precisión · arrastra largo = velocidad</div></footer>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
